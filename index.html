<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel · Variedades Jared</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1f; --bg-2:#0c1227; --surface:#121a33; --surface-2:#172245;
  --border:rgba(255,255,255,.08); --border-2:rgba(255,255,255,.14);
  --text:#e9edf7; --muted:#94a1c2; --faint:#6b7aa0;
  --accent:#2dd4bf; --accent-soft:rgba(45,212,191,.14);
  --indigo:#818cf8; --indigo-soft:rgba(129,140,248,.16);
  --warn:#f59e0b; --warn-soft:rgba(245,158,11,.15);
  --danger:#f87171; --danger-soft:rgba(248,113,113,.15);
  --good:#34d399; --good-soft:rgba(52,211,153,.15);
  --radius:14px;
}
body.light{
  --bg:#eef1f8; --bg-2:#e7ebf5; --surface:#fff; --surface-2:#f4f6fc;
  --border:#e2e7f2; --border-2:#d4dbeb;
  --text:#16203a; --muted:#5b6788; --faint:#8a96b4;
  --accent:#0d9488; --accent-soft:rgba(13,148,136,.12);
  --indigo:#6366f1; --indigo-soft:rgba(99,102,241,.12);
  --warn:#d97706; --warn-soft:rgba(217,119,6,.13);
  --danger:#dc2626; --danger-soft:rgba(220,38,38,.12);
  --good:#16a34a; --good-soft:rgba(22,163,74,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%, var(--bg-2), var(--bg)) fixed;
  color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
h1,h2,.num{font-family:"Sora","Inter",sans-serif}
button{font-family:inherit;cursor:pointer}
.tnum{font-variant-numeric:tabular-nums}

header.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 20px;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.brandmark{display:flex;align-items:center;gap:12px;flex:1 1 auto;min-width:180px}
.logo{width:40px;height:40px;flex:0 0 auto;display:grid;place-items:center;border-radius:11px;
  background:linear-gradient(135deg,var(--accent),var(--indigo))}
.logo svg{width:23px;height:23px;color:#06121f}
body.light .logo svg{color:#fff}
.brand-name{font-family:"Sora";font-weight:800;font-size:17px;line-height:1.1}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--muted);
  padding:6px 11px;border:1px solid var(--border);border-radius:999px;background:var(--surface)}
.live .dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
.live.on .dot{background:var(--good);animation:pulse 2s infinite}
.live.err .dot{background:var(--danger)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
.icon-btn{display:grid;place-items:center;width:38px;height:38px;border-radius:10px;background:var(--surface);
  border:1px solid var(--border);color:var(--text)}
.icon-btn:hover{border-color:var(--border-2)}
.icon-btn svg{width:18px;height:18px}

nav.tabs{display:flex;gap:6px;padding:12px 16px 0;overflow-x:auto;max-width:1200px;margin:0 auto}
nav.tabs button{white-space:nowrap;border:none;background:transparent;color:var(--muted);font-weight:600;
  font-size:14.5px;padding:11px 18px;border-radius:10px 10px 0 0;border-bottom:2px solid transparent}
nav.tabs button:hover{color:var(--text)}
nav.tabs button.active{color:var(--text);border-bottom-color:var(--accent);background:var(--surface)}

main{max-width:1200px;margin:0 auto;padding:16px}

.filters{display:flex;flex-wrap:wrap;gap:9px;align-items:flex-end;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.field select,.field input{padding:9px 11px;border-radius:10px;border:1px solid var(--border-2);
  background:var(--surface-2);color:var(--text);font-size:13.5px;outline:none;min-width:120px}
.field input.search{min-width:180px}
.field select:focus,.field input:focus{border-color:var(--accent)}
.btn-ghost{padding:9px 14px;border-radius:10px;border:1px solid var(--border-2);background:transparent;
  color:var(--muted);font-size:13px;font-weight:600;align-self:flex-end}
.btn-ghost:hover{color:var(--text);border-color:var(--accent)}

.count-note{font-size:13px;color:var(--muted);margin:0 0 12px;font-weight:500}
.count-note b{color:var(--text)}
.tab[hidden]{display:none}
section.tab{animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}

.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:520px}
thead th{position:sticky;top:0;background:var(--surface-2);text-align:left;font-weight:700;color:var(--muted);
  font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:11px 14px;border-bottom:1px solid var(--border)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
td.r,th.r{text-align:right}
td.c,th.c{text-align:center}
.empty{padding:40px 16px;text-align:center;color:var(--faint);font-size:14px}

.prodrow{display:flex;align-items:flex-start;gap:10px}
.thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex:0 0 auto;border:1px solid var(--border);background:var(--surface-2);cursor:zoom-in}
.thumb:hover{border-color:var(--accent)}
.prod{font-size:13px;line-height:1.45}
.prod b{font-weight:700}
.zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;cursor:zoom-out}
.zoom-overlay.open{display:flex}
.zoom-overlay img{max-width:100%;max-height:100%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;
  background:var(--surface-2);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
.tag b{color:var(--text);font-weight:600}

.sizes{display:flex;flex-wrap:wrap;gap:6px}
.size{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:3px 9px;border-radius:8px;
  background:var(--good-soft);font-weight:600}
.size.zero{background:var(--danger-soft);opacity:.85}
.size.low{background:var(--warn-soft)}
.size .q{font-variant-numeric:tabular-nums}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.badge.dev{background:var(--indigo-soft);color:var(--indigo)}
.badge.camb{background:var(--warn-soft);color:var(--warn)}
.qpos{color:var(--good);font-weight:700}

.hint-card{background:var(--surface);border:1px dashed var(--border-2);border-radius:var(--radius);
  padding:24px;text-align:center}
.hint-card h3{margin:0 0 8px;font-size:16px;font-family:"Sora"}
.hint-card p{margin:6px auto;max-width:560px;font-size:13.5px;color:var(--muted);line-height:1.6}
.flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flow .arrow{color:var(--muted);font-size:18px}
footer{max-width:1200px;margin:0 auto;padding:10px 18px 28px;color:var(--faint);font-size:11.5px}
@media (prefers-reduced-motion: reduce){*{animation:none!important}}
@media (max-width:560px){
  body{font-size:14px}
  main{padding:12px}
  header.top{padding:11px 13px;gap:10px}
  nav.tabs{padding:10px 12px 0}
  nav.tabs button{padding:10px 13px;font-size:13.5px}
  .filters{padding:11px;gap:8px}
  .field select,.field input{min-width:110px;font-size:13px;padding:8px 9px}
  .field input.search{min-width:140px}
  table{min-width:0}
  thead th{padding:8px 9px;font-size:10px;letter-spacing:.2px}
  tbody td{padding:9px 9px}
  .thumb{width:36px;height:36px}
  .prodrow{gap:8px}
  .prod{font-size:12px}
  .size{font-size:11px;padding:2px 7px;gap:4px}
  .tag{font-size:10px;padding:2px 6px}
  .flow{gap:6px}
}
</style>
</head>
<body>
<header class="top">
  <div class="brandmark">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4 6l2 3 2-1v10h8V8l2 1 2-3-4-3-2 2a2.5 2.5 0 0 1-4 0Z"/></svg></div>
    <div><div class="brand-name">Variedades Jared</div><div class="brand-sub">Panel · Solo lectura</div></div>
  </div>
  <div class="live" id="liveBadge"><span class="dot"></span><span id="liveText">Conectando…</span></div>
  <button class="icon-btn" id="themeBtn" title="Tema">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></svg>
  </button>
</header>

<nav class="tabs">
  <button data-tab="stock" class="active">Stock</button>
  <button data-tab="ventas">Ventas</button>
  <button data-tab="ingresos">Ingresos</button>
  <button data-tab="cambios">Cambios y devoluciones</button>
</nav>

<main>
  <div class="filters">
    <div class="field"><label>Buscar</label><input class="search" id="fBuscar" placeholder="equipo, dorsal, color…"></div>
    <div class="field" id="wrapPeriodo"><label>Periodo</label><select id="fPeriodo">
      <option value="todo">Todo</option><option value="hoy">Hoy</option><option value="semana">Esta semana</option><option value="mes">Este mes</option>
    </select></div>
    <div class="field"><label>Equipo</label><select id="fEquipo"></select></div>
    <div class="field"><label>Dorsal</label><select id="fDorsal"></select></div>
    <div class="field"><label>Color</label><select id="fColor"></select></div>
    <div class="field"><label>Versión</label><select id="fVersion"></select></div>
    <div class="field"><label>Talla</label><select id="fTalla"></select></div>
    <div class="field"><label>Categoría</label><select id="fCategoria"></select></div>
    <div class="field"><label>Año</label><select id="fAnio"></select></div>
    <div class="field" id="wrapEstado"><label>Estado</label><select id="fEstado">
      <option value="">Todos</option><option value="disp">Disponibles</option><option value="agot">Con talla agotada</option><option value="bajo">Con 1 unidad</option>
    </select></div>
    <button class="btn-ghost" id="fLimpiar">Limpiar</button>
  </div>

  <p class="count-note" id="countNote"></p>

  <section class="tab" id="tab-stock">
    <div class="table-wrap"><table id="tStock"><thead><tr><th>Producto</th><th>Tallas / Stock</th><th class="r">Total</th></tr></thead><tbody></tbody></table></div>
  </section>
  <section class="tab" id="tab-ventas" hidden>
    <div class="table-wrap"><table id="tVentas"><thead><tr><th>Fecha</th><th>Producto</th><th class="r">Cant.</th><th class="c">Estado</th></tr></thead><tbody></tbody></table></div>
  </section>
  <section class="tab" id="tab-ingresos" hidden>
    <div id="ingresosBox"></div>
  </section>
  <section class="tab" id="tab-cambios" hidden>
    <div class="table-wrap"><table id="tCambios"><thead><tr><th>Fecha</th><th class="c">Tipo</th><th>Detalle</th></tr></thead><tbody></tbody></table></div>
  </section>
</main>
<footer>Variedades Jared · Visualización en tiempo real · Los datos no se modifican desde aquí.</footer>

<div id="zoomOverlay" class="zoom-overlay"><img id="zoomImg" src="" alt=""></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const CONFIG={
  firebase:{apiKey:"AIzaSyCi_LuHHxYZWEju23ejbm4rb5NAp_qUjbM",authDomain:"variedades-jared.firebaseapp.com",projectId:"variedades-jared"},
  coleccion:"jared", documento:"datos"
};
let INV=[],SAL=[],CAMB=[],BIT=[];
let _invById=new Map(),_invByModel=new Map();
let tabActiva="stock";
const F={q:"",periodo:"todo",eq:"",dor:"",col:"",ver:"",tal:"",cat:"",anio:"",estado:""};

/* ---------- utilidades ---------- */
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function has(x){return x!=null&&String(x).trim()!=="";}
function num(x){const n=Number(x);return isNaN(n)?0:n;}
function pf(o,...ks){if(!o)return"";for(const k of ks){if(o[k]!=null&&String(o[k]).trim()!=="")return o[k];}return"";}
function asArray(v){
  if(Array.isArray(v))return v;
  if(typeof v==="string"){try{const p=JSON.parse(v);return Array.isArray(p)?p:[];}catch(e){return[];}}
  if(v&&typeof v==="object")return Object.values(v);
  return[];
}
function parseFecha(v){
  if(!v)return null;
  if(typeof v==="object"){if(typeof v.toDate==="function"){try{return v.toDate();}catch(e){}}if("seconds"in v)return new Date(v.seconds*1000);}
  if(typeof v==="number")return new Date(v<1e12?v*1000:v);
  if(typeof v==="string"){
    if(/^\d{4}-\d{2}-\d{2}/.test(v)){const d=new Date(v);if(!isNaN(d))return d;}
    const m=v.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:[ ,T]+(\d{1,2}):(\d{2}))?/);
    if(m){let[,dd,mm,yy,hh,mi]=m;yy=yy.length===2?"20"+yy:yy;return new Date(+yy,+mm-1,+dd,+(hh||0),+(mi||0));}
    const d=new Date(v);if(!isNaN(d))return d;
  }
  return null;
}
function fmtFecha(d){return d?d.toLocaleDateString("es",{day:"2-digit",month:"short",year:"numeric"}):"—";}

/* descriptores del producto (todos, sin abreviar) */
function prodCampos(it){
  const c=[];const ex=it.extras||{};
  if(has(it.eq))c.push(["Equipo",it.eq]);
  if(has(it.dor))c.push(["Dorsal",it.dor]);
  if(has(it.col))c.push(["Color",it.col]);
  if(has(it.ver))c.push(["Versión",it.ver]);
  const est=pf(ex,"Estilo","estilo");if(has(est))c.push(["Estilo",est]);
  const cat=pf(ex,"Categoría","Categoria","categoria");if(has(cat))c.push(["Categoría",cat]);
  const anio=pf(it,"año","ano","anio");if(has(anio))c.push(["Año",anio]);
  Object.keys(ex).forEach(k=>{if(["Estilo","estilo","Categoría","Categoria","categoria"].includes(k))return;if(has(ex[k]))c.push([k,ex[k]]);});
  return c;
}
/* normaliza URLs de fotos (igual que la app: Dropbox -> raw) */
function normalizarFotoUrl(url){
  if(!url)return url;
  if(url.indexOf("dropbox.com")>=0){
    url=url.replace(/[?&]dl=\d/,m=>m[0]==="?"?"?raw=1":"&raw=1");
    if(url.indexOf("raw=1")<0)url+=url.indexOf("?")>=0?"&raw=1":"?raw=1";
    url=url.replace("www.dropbox.com","dl.dropboxusercontent.com");
  }
  return url;
}
/* busca la foto principal de un producto (directo, por invId o por modelo) */
function fotoDe(it){
  let fts=it.fotos;
  if((!fts||!fts.length)&&it.invId!=null&&_invById.has(it.invId))fts=_invById.get(it.invId).fotos;
  if((!fts||!fts.length)){const m=_invByModel.get(modeloKey(it));if(m)fts=m.fotos;}
  if(!fts||!fts.length)return null;
  const p=fts.find(f=>f&&f.principal)||fts[0];
  return p&&p.url?normalizarFotoUrl(p.url):null;
}
/* valores del producto en orden, SIN etiquetas:
   Equipo, Versión, Color, Dorsal, Categoría, Año, Edición especial, [Talla], otras extras */
function descValores(it,incTalla){
  const ex=it.extras||{};const out=[];
  if(has(it.eq))out.push(String(it.eq));
  if(has(it.ver))out.push(String(it.ver));
  if(has(it.col))out.push(String(it.col));
  if(has(it.dor))out.push(String(it.dor));
  const cat=pf(ex,"Categoría","Categoria","categoria");if(has(cat))out.push(String(cat));
  const anio=pf(it,"año","ano","anio");if(has(anio))out.push(String(anio));
  const edKey=Object.keys(ex).find(k=>{const n=k.toLowerCase();return n.includes("edici")&&n.includes("espec");})||Object.keys(ex).find(k=>k.toLowerCase().includes("edici"));
  if(edKey&&has(ex[edKey]))out.push(String(ex[edKey]));
  if(incTalla&&has(it.tal))out.push("T:"+it.tal);
  const usadas=new Set(["Categoría","Categoria","categoria"]);if(edKey)usadas.add(edKey);
  Object.keys(ex).forEach(k=>{if(usadas.has(k))return;if(has(ex[k]))out.push(String(ex[k]));});
  return out;
}
function prodCell(it,incTalla){
  const vals=descValores(it,incTalla);
  const foto=fotoDe(it);
  const img=foto?`<img class="thumb" src="${esc(foto)}" data-zoom="${esc(foto)}" onerror="this.remove()">`:"";
  const txt=vals.length?('<b>'+esc(vals[0])+'</b>'+vals.slice(1).map(v=>" · "+esc(v)).join("")):"—";
  return `<div class="prodrow">${img}<span class="prod">${txt}</span></div>`;
}
function modeloKey(it){const ex=it.extras||{};
  return [it.eq,it.dor,it.col,it.ver,pf(it,"año","ano","anio"),pf(ex,"Estilo","estilo"),pf(ex,"Categoría","Categoria","categoria")].map(x=>String(x==null?"":x)).join("||");}

/* ---------- filtros ---------- */
function coincideVariantes(it){
  if(F.eq&&String(it.eq||"")!==F.eq)return false;
  if(F.dor&&String(it.dor||"")!==F.dor)return false;
  if(F.col&&String(it.col||"")!==F.col)return false;
  if(F.ver&&String(it.ver||"")!==F.ver)return false;
  if(F.tal&&String(it.tal||"")!==F.tal)return false;
  if(F.anio&&String(pf(it,"año","ano","anio"))!==F.anio)return false;
  if(F.cat&&String(pf(it.extras||{},"Categoría","Categoria","categoria"))!==F.cat)return false;
  return true;
}
function coincideTexto(it){
  if(!F.q)return true;const q=F.q.toLowerCase();
  return prodCampos(it).some(([,v])=>String(v).toLowerCase().includes(q));
}
function coincideTextoStr(s){if(!F.q)return true;return String(s||"").toLowerCase().includes(F.q.toLowerCase());}
function rangoPeriodo(){
  if(F.periodo==="todo")return[null,null];
  const now=new Date();const hoy0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const fin=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59,999);
  if(F.periodo==="hoy")return[hoy0,fin];
  if(F.periodo==="semana"){const d=(now.getDay()+6)%7;const s=new Date(hoy0);s.setDate(s.getDate()-d);return[s,fin];}
  if(F.periodo==="mes")return[new Date(now.getFullYear(),now.getMonth(),1),fin];
  return[null,null];
}
function coincidePeriodo(fechaStr){
  const[ini,fin]=rangoPeriodo();if(!ini&&!fin)return true;
  const f=parseFecha(fechaStr);if(!f)return false;
  if(ini&&f<ini)return false;if(fin&&f>fin)return false;return true;
}

/* orden de tallas: S M L XL 2XL 3XL 4XL ... luego numéricas (16,18..) ... luego #5.. */
const TALLA_ORDEN=["XS","S","M","L","XL","2XL","3XL","4XL","5XL","6XL"];
function tallaRank(t){
  const s=String(t==null?"":t).trim().toUpperCase().replace(/\s+/g,"");
  let norm=s;const xm=s.match(/^(X+)L$/);
  if(xm){const n=xm[1].length;norm=n===1?"XL":(n+"XL");}
  const idx=TALLA_ORDEN.indexOf(norm);
  if(idx>=0)return[0,idx];
  if(/^\d+$/.test(s))return[1,parseInt(s,10)];
  const h=s.match(/^#\s*(\d+)/);if(h)return[2,parseInt(h[1],10)];
  return[3,0];
}
function compararTallas(a,b){
  const ra=tallaRank(a),rb=tallaRank(b);
  if(ra[0]!==rb[0])return ra[0]-rb[0];
  if(ra[1]!==rb[1])return ra[1]-rb[1];
  return String(a).localeCompare(String(b),"es",{numeric:true});
}
/* opciones de selects */
function llenarSelect(id,valores,etiqueta,cmp){
  const sel=document.getElementById(id);const cur=sel.value;
  const uniq=[...new Set(valores.filter(has).map(String))].sort(cmp||((a,b)=>a.localeCompare(b,"es",{numeric:true})));
  sel.innerHTML=`<option value="">${etiqueta}</option>`+uniq.map(v=>`<option>${esc(v)}</option>`).join("");
  if(uniq.includes(cur))sel.value=cur;
}
function llenarFiltros(){
  llenarSelect("fEquipo",INV.map(x=>x.eq),"Todos");
  llenarSelect("fDorsal",INV.map(x=>x.dor),"Todos");
  llenarSelect("fColor",INV.map(x=>x.col),"Todos");
  llenarSelect("fVersion",INV.map(x=>x.ver),"Todas");
  llenarSelect("fTalla",INV.map(x=>x.tal),"Todas",compararTallas);
  llenarSelect("fCategoria",INV.map(x=>pf(x.extras||{},"Categoría","Categoria","categoria")),"Todas");
  llenarSelect("fAnio",INV.map(x=>pf(x,"año","ano","anio")),"Todos");
}

/* ---------- render: STOCK ---------- */
function renderStock(){
  const items=INV.filter(it=>coincideVariantes(it)&&coincideTexto(it));
  const map=new Map();
  items.forEach(it=>{const k=modeloKey(it);if(!map.has(k))map.set(k,{ref:it,tallas:[],total:0});
    const g=map.get(k);const s=num(it.stk);g.tallas.push({tal:has(it.tal)?it.tal:"—",stk:s});g.total+=s;});
  let grupos=[...map.values()];
  if(F.estado==="agot")grupos=grupos.filter(g=>g.tallas.some(t=>t.stk<=0));
  else if(F.estado==="bajo")grupos=grupos.filter(g=>g.tallas.some(t=>t.stk===1));
  else if(F.estado==="disp")grupos=grupos.filter(g=>g.total>0);
  grupos.sort((a,b)=>String(a.ref.eq||"").localeCompare(String(b.ref.eq||""),"es"));
  setCount(`<b>${grupos.length}</b> modelo(s) · <b>${grupos.reduce((a,g)=>a+g.total,0).toLocaleString("es")}</b> unidad(es)`);
  const tb=document.querySelector("#tStock tbody");
  if(!grupos.length){tb.innerHTML='<tr><td colspan="3"><div class="empty">No hay productos con estos filtros.</div></td></tr>';return;}
  tb.innerHTML=grupos.map(g=>{
    const tallas=g.tallas.slice().sort((a,b)=>compararTallas(a.tal,b.tal))
      .map(t=>{const cl=t.stk<=0?"zero":(t.stk===1?"low":"");return `<span class="size ${cl}">${esc(t.tal)} <span class="q">${t.stk}</span></span>`;}).join("");
    return `<tr><td>${prodCell(g.ref)}</td><td><div class="sizes">${tallas}</div></td><td class="r tnum"><b>${g.total}</b></td></tr>`;
  }).join("");
}

/* ---------- render: VENTAS ---------- */
function renderVentas(){
  const rows=SAL.filter(s=>coincideVariantes(s)&&coincideTexto(s)&&coincidePeriodo(s.fecha))
    .map(s=>({s,f:parseFecha(s.fecha)})).sort((a,b)=>(b.f?+b.f:0)-(a.f?+a.f:0));
  const uds=rows.reduce((a,{s})=>a+Math.abs(num(s.qty)),0);
  setCount(`<b>${rows.length}</b> venta(s) · <b>${uds.toLocaleString("es")}</b> unidad(es)`);
  const tb=document.querySelector("#tVentas tbody");
  if(!rows.length){tb.innerHTML='<tr><td colspan="4"><div class="empty">No hay ventas con estos filtros.</div></td></tr>';return;}
  tb.innerHTML=rows.map(({s,f})=>{
    let estado="—";
    if(s.devuelta)estado='<span class="badge dev">Devuelta</span>';
    else if(s.cambiada)estado='<span class="badge camb">Cambiada</span>';
    return `<tr><td class="tnum">${esc(fmtFecha(f))}</td><td>${prodCell(s,true)}</td><td class="r tnum">${Math.abs(num(s.qty))}</td><td class="c">${estado}</td></tr>`;
  }).join("");
}

/* ---------- render: INGRESOS (desde bitácora si existe) ---------- */
function renderIngresos(){
  const box=document.getElementById("ingresosBox");
  if(!BIT.length){
    setCount("");
    box.innerHTML=`<div class="hint-card">
      <h3>Los ingresos aún no están disponibles</h3>
      <p>Las ventas, los cambios y el stock ya se ven porque tu app los sincroniza con Firebase. Los <b>ingresos de inventario</b> viven solo en la bitácora del dispositivo, que todavía no se sincroniza.</p>
      <p>Para activarlos, aplicá el pequeño cambio de 2 líneas en tu app (sincronizar la bitácora). En cuanto lo hagas, esta sección se llena sola.</p>
    </div>`;
    return;
  }
  const rows=BIT.filter(e=>{const t=String(e.tipo||"").toLowerCase();return t.includes("mod_suma")||t==="ingreso";})
    .filter(e=>coincideTextoStr(e.desc)&&coincidePeriodo(e.fechaISO||e.fecha))
    .map(e=>({e,f:parseFecha(e.fechaISO||e.fecha)})).sort((a,b)=>(b.f?+b.f:0)-(a.f?+a.f:0));
  setCount(`<b>${rows.length}</b> ingreso(s) de stock`);
  if(!rows.length){box.innerHTML='<div class="table-wrap"><table><tbody><tr><td><div class="empty">No hay ingresos con estos filtros.</div></td></tr></tbody></table></div>';return;}
  box.innerHTML='<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Producto</th><th class="r">Cantidad</th></tr></thead><tbody>'+
    rows.map(({e,f})=>`<tr><td class="tnum">${esc(fmtFecha(f))}${e.hora?(' · '+esc(e.hora)):''}</td><td>${esc(e.desc||"—")}</td><td class="r"><span class="qpos">${esc(e.detalle||"")}</span></td></tr>`).join("")+
    '</tbody></table></div>';
}

/* ---------- render: CAMBIOS y DEVOLUCIONES ---------- */
function cambioCoincide(c){
  const partes=[];
  if(c.devuelta&&typeof c.devuelta==="object")partes.push(c.devuelta);
  if(c.llevada&&typeof c.llevada==="object"&&!c.llevada.externa)partes.push(c.llevada);
  if(!partes.length)partes.push(c);
  const okVar=partes.some(p=>coincideVariantes(p));
  const okTxt=!F.q||partes.some(p=>coincideTexto(p));
  return okVar&&okTxt;
}
function renderCambios(){
  const rows=CAMB.filter(c=>cambioCoincide(c)&&coincidePeriodo(c.fecha))
    .map(c=>({c,f:parseFecha(c.fecha)})).sort((a,b)=>(b.f?+b.f:0)-(a.f?+a.f:0));
  setCount(`<b>${rows.length}</b> registro(s)`);
  const tb=document.querySelector("#tCambios tbody");
  if(!rows.length){tb.innerHTML='<tr><td colspan="3"><div class="empty">No hay cambios ni devoluciones con estos filtros.</div></td></tr>';return;}
  tb.innerHTML=rows.map(({c,f})=>{
    const esCambio=String(c.tipo||"").toLowerCase().includes("cambio");
    const badge=esCambio?'<span class="badge camb">Cambio</span>':'<span class="badge dev">Devolución</span>';
    let detalle="";
    if(esCambio){
      const dev=c.devuelta||{};const lle=c.llevada||{};
      const llevadaHtml=lle.externa?'<span class="tag">Fuera del inventario</span>':prodCell(lle,true);
      detalle=`<div class="flow"><div><div class="tag">Devolvió</div>${prodCell(dev,true)}</div><span class="arrow">→</span><div><div class="tag">Se llevó</div>${llevadaHtml}</div></div>`;
    }else{
      detalle=prodCell(c);
    }
    return `<tr><td class="tnum">${esc(fmtFecha(f))}</td><td class="c">${badge}</td><td>${detalle}</td></tr>`;
  }).join("");
}

/* ---------- orquestación ---------- */
function setCount(t){document.getElementById("countNote").innerHTML=t;}
function renderActiva(){
  document.getElementById("wrapPeriodo").style.display=(tabActiva==="stock")?"none":"";
  document.getElementById("wrapEstado").style.display=(tabActiva==="stock")?"":"none";
  if(tabActiva==="stock")renderStock();
  else if(tabActiva==="ventas")renderVentas();
  else if(tabActiva==="ingresos")renderIngresos();
  else if(tabActiva==="cambios")renderCambios();
}
function indexarInv(){
  _invById=new Map();_invByModel=new Map();
  INV.forEach(it=>{
    if(it.id!=null)_invById.set(it.id,it);
    const k=modeloKey(it);
    if(!_invByModel.has(k))_invByModel.set(k,it);
    else{const cur=_invByModel.get(k);if((!cur.fotos||!cur.fotos.length)&&it.fotos&&it.fotos.length)_invByModel.set(k,it);}
  });
}
function renderTodo(){indexarInv();llenarFiltros();renderActiva();}

/* ---------- Firebase ---------- */
function setLive(state,text){const b=document.getElementById("liveBadge");
  b.className="live"+(state==="on"?" on":state==="err"?" err":"");document.getElementById("liveText").textContent=text;}
function initFirebase(){
  if(typeof firebase==="undefined"){setLive("err","No se pudo cargar Firebase");return;}
  try{
    firebase.initializeApp(CONFIG.firebase);
    const db=firebase.firestore();
    db.collection(CONFIG.coleccion).doc(CONFIG.documento).onSnapshot(snap=>{
      const d=snap.data()||{};
      INV=asArray(d.inv); SAL=asArray(d.sal); CAMB=asArray(d.camb); BIT=asArray(d.bit);
      setLive("on","En vivo · "+new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}));
      renderTodo();
    },err=>{console.error(err);setLive("err","Error de conexión");});
  }catch(e){console.error(e);setLive("err","Error al iniciar Firebase");}
}

/* ---------- eventos ---------- */
document.querySelectorAll("nav.tabs button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");tabActiva=b.dataset.tab;
  document.querySelectorAll(".tab").forEach(s=>s.hidden=true);
  document.getElementById("tab-"+tabActiva).hidden=false;
  renderActiva();
}));
const bind=(id,key,ev)=>document.getElementById(id).addEventListener(ev||"change",e=>{F[key]=e.target.value;renderActiva();});
bind("fBuscar","q","input");bind("fPeriodo","periodo");bind("fEquipo","eq");bind("fDorsal","dor");
bind("fColor","col");bind("fVersion","ver");bind("fTalla","tal");bind("fCategoria","cat");bind("fAnio","anio");bind("fEstado","estado");
document.getElementById("fLimpiar").addEventListener("click",()=>{
  Object.assign(F,{q:"",periodo:"todo",eq:"",dor:"",col:"",ver:"",tal:"",cat:"",anio:"",estado:""});
  ["fBuscar","fEquipo","fDorsal","fColor","fVersion","fTalla","fCategoria","fAnio","fEstado"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fPeriodo").value="todo";
  renderActiva();
});
document.getElementById("themeBtn").addEventListener("click",()=>{
  document.body.classList.toggle("light");
  try{localStorage.setItem("vj_theme",document.body.classList.contains("light")?"light":"dark");}catch(e){}
});
(function(){try{if(localStorage.getItem("vj_theme")==="light")document.body.classList.add("light");}catch(e){}})();

function zoom(url){const o=document.getElementById("zoomOverlay");document.getElementById("zoomImg").src=url;o.classList.add("open");}
document.getElementById("zoomOverlay").addEventListener("click",function(){this.classList.remove("open");});
document.addEventListener("click",e=>{const t=e.target;if(t&&t.classList&&t.classList.contains("thumb")){const u=t.getAttribute("data-zoom");if(u)zoom(u);}});

function arrancar(){
  if(typeof firebase!=="undefined"){initFirebase();return;}
  setLive("","Cargando Firebase…");
  setTimeout(function(){
    if(typeof firebase!=="undefined")initFirebase();
    else setLive("err","No se pudo cargar Firebase (revisá conexión / navegador)");
  },1800);
}
arrancar();
</script>
